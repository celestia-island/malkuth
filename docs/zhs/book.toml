[book]
title = "Malkuth 文档"
description = "通用 Rust 服务监督工具包：优雅关闭、健康探针、Worker 监督、Socket 激活与协调锁"
authors = ["celestia-island"]
language = "zh"
src = "."

[build]
build-dir = "../../target/docs/zhs"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/malkuth"
edit-url-template = "https://github.com/celestia-island/malkuth/edit/dev/docs/zhs/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
