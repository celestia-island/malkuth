[book]
title = "Документация Malkuth"
description = "Универсальный набор инструментов Rust для надзора за сервисами"
authors = ["celestia-island"]
language = "ru"
src = "."

[build]
build-dir = "../../target/docs/ru"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/malkuth"
edit-url-template = "https://github.com/celestia-island/malkuth/edit/dev/docs/ru/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
